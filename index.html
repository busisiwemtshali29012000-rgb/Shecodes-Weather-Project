    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pro Weather App</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="app">

    <!-- Header -->
    <header>
      <h1>🌦️ Pro Weather Dashboard</h1>
      <p>Real-time weather powered by OpenWeather API</p>
    </header>

    <!-- Search -->
    <div class="card search-card">
      <input id="cityInput" type="text" placeholder="Enter city (e.g. Johannesburg)" />
      <button onclick="getWeather()">Search</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden">⏳ Loading weather data...</div>

    <!-- Weather Result -->
    <div id="weather" class="card weather-card"></div>

    <!-- Forecast -->
    <div id="forecast" class="forecast"></div>

    <!-- Mini Search Engine -->
    <div class="card search-card">
      <input id="googleInput" type="text" placeholder="Search Google..." />
      <button onclick="googleSearch()">Search</button>
    </div>

    <!-- Footer -->
    <footer>
      <p>Built with HTML, CSS, JS | API: OpenWeather</p>
      <p class="small">
        ⚡ Beginner project
      </p>
      <a href="https://github.com/YOUR-USERNAME" target="_blank">
        View GitHub Repository
      </a>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
</body>
</html>
